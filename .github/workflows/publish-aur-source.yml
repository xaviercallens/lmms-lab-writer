name: Publish AUR Source Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to package, for example v0.1.3
        required: true
      pkgrel:
        description: AUR pkgrel to publish
        required: true
        default: "1"

concurrency:
  group: publish-aur-source-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish lmms-lab-writer
    runs-on: ubuntu-latest
    env:
      AUR_HOME: /tmp/aur-home
      AUR_PKGNAME: lmms-lab-writer
      AUR_WORKDIR: /tmp/aur-packages/lmms-lab-writer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git openssh-client

      - name: Generate source package files
        run: |
          set -euo pipefail
          node scripts/generate-aur-source-package.mjs \
            --tag "${{ inputs.tag }}" \
            --pkgrel "${{ inputs.pkgrel }}" \
            --out-dir aur-package/lmms-lab-writer

      - name: Configure AUR SSH
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "Missing GitHub secret: AUR_SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          install -d -m 700 "$AUR_HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' > "$AUR_HOME/.ssh/aur"
          chmod 600 "$AUR_HOME/.ssh/aur"
          ssh-keygen -y -f "$AUR_HOME/.ssh/aur" > /dev/null

          ssh-keyscan -t ed25519 aur.archlinux.org > "$AUR_HOME/.ssh/known_hosts"
          chmod 600 "$AUR_HOME/.ssh/known_hosts"
          {
            printf '%s\n' "Host aur.archlinux.org"
            printf '%s\n' "  HostName aur.archlinux.org"
            printf '%s\n' "  User aur"
            printf '%s\n' "  IdentityFile $AUR_HOME/.ssh/aur"
            printf '%s\n' "  IdentitiesOnly yes"
            printf '%s\n' "  UserKnownHostsFile $AUR_HOME/.ssh/known_hosts"
            printf '%s\n' "  StrictHostKeyChecking yes"
          } > "$AUR_HOME/.ssh/config"
          chmod 600 "$AUR_HOME/.ssh/config"

          ssh -F "$AUR_HOME/.ssh/config" -T aur.archlinux.org help

      - name: Push package to AUR
        shell: bash
        run: |
          set -euo pipefail

          export GIT_SSH_COMMAND="ssh -F $AUR_HOME/.ssh/config"
          aur_url="ssh://aur@aur.archlinux.org/${AUR_PKGNAME}.git"

          rm -rf "$AUR_WORKDIR"
          git clone "$aur_url" "$AUR_WORKDIR"
          cp aur-package/lmms-lab-writer/PKGBUILD aur-package/lmms-lab-writer/.SRCINFO "$AUR_WORKDIR/"

          git -C "$AUR_WORKDIR" config user.name "github-actions[bot]"
          git -C "$AUR_WORKDIR" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$AUR_WORKDIR" add PKGBUILD .SRCINFO

          if git -C "$AUR_WORKDIR" diff --cached --quiet; then
            echo "AUR package ${AUR_PKGNAME} is already up to date."
            exit 0
          fi

          git -C "$AUR_WORKDIR" commit -m "Release ${{ inputs.tag }}-${{ inputs.pkgrel }}"
          git -C "$AUR_WORKDIR" push origin HEAD:master
