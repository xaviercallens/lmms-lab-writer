name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri-release:
    name: Release Build (${{ matrix.name }})
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: ""
          - name: macOS (ARM64)
            os: macos-latest
            target: aarch64-apple-darwin
          - name: macOS (x64)
            os: macos-15-intel
            target: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Prepare macOS bundle tools
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          DEVELOPER_BIN="$(xcode-select -p)/usr/bin"
          echo "$DEVELOPER_BIN" >> "$GITHUB_PATH"
          echo "Using Xcode developer tools from: $DEVELOPER_BIN"
          xcrun --find SetFile
          xcrun --find Rez
          command -v hdiutil
          command -v osascript

      - run: pnpm install --frozen-lockfile

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-version.mjs --from-tag ${{ github.ref_name }}

      - name: Build Tauri app
        run: pnpm --filter @lmms-lab/writer-desktop tauri build --ci -v ${{ matrix.target && format('--target {0}', matrix.target) }}

      - name: Build PKG installer (macOS release)
        if: startsWith(matrix.os, 'macos') && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_TARGET_TRIPLE: ${{ matrix.target }}
        run: ./scripts/build-pkg.sh

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/**
          retention-days: 7

  build-aur-package:
    name: Prepare AUR Package Files
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-tauri-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-Linux
          path: aur-input

      - name: Generate PKGBUILD and .SRCINFO
        if: ${{ !contains(github.ref_name, '-') }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-aur-bin-package.mjs \
            --tag "${{ github.ref_name }}" \
            --linux-artifacts-dir aur-input \
            --out-dir aur-dist/lmms-lab-writer-bin
          node scripts/generate-aur-source-package.mjs \
            --tag "${{ github.ref_name }}" \
            --out-dir aur-dist/lmms-lab-writer

      - name: Archive AUR package files
        if: ${{ !contains(github.ref_name, '-') }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p aur-dist
          tar -czf "aur-dist/lmms-lab-writer-bin-${{ github.ref_name }}-aur.tar.gz" -C aur-dist/lmms-lab-writer-bin .
          tar -czf "aur-dist/lmms-lab-writer-${{ github.ref_name }}-aur.tar.gz" -C aur-dist/lmms-lab-writer .

      - name: Upload AUR package files
        if: ${{ !contains(github.ref_name, '-') }}
        uses: actions/upload-artifact@v4
        with:
          name: build-AUR
          path: |
            aur-dist/lmms-lab-writer-bin/**
            aur-dist/lmms-lab-writer/**
            aur-dist/*.tar.gz
          include-hidden-files: true
          retention-days: 7

  build-tauri-arch-release:
    name: Release Compile Check (Arch Linux)
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            git \
            nodejs \
            npm \
            rust \
            cargo \
            curl \
            wget \
            file \
            openssl \
            xdg-utils \
            webkit2gtk-4.1 \
            libappindicator-gtk3 \
            librsvg \
            patchelf
          npm install -g pnpm@10.29.3

      - uses: actions/checkout@v4

      - run: pnpm install --frozen-lockfile

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-version.mjs --from-tag ${{ github.ref_name }}

      - name: Compile Tauri app on Arch Linux
        run: pnpm --filter @lmms-lab/writer-desktop tauri build --ci -v --no-bundle

  release-github:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-tauri-release
      - build-tauri-arch-release
      - build-aur-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          overwrite_files: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.pkg
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.app.tar.gz
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.rpm
            release-artifacts/**/*.sig
            release-artifacts/**/*.json

  release-arch-package:
    name: Build and Release Arch Package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    needs:
      - build-aur-package
      - release-github
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    env:
      AUR_PKGNAME: lmms-lab-writer-bin
    permissions:
      contents: write
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            git \
            nodejs \
            curl \
            github-cli \
            gtk3 \
            webkit2gtk-4.1 \
            libappindicator-gtk3 \
            zstd

      - name: Download AUR package files
        uses: actions/download-artifact@v4
        with:
          name: build-AUR
          path: aur-package

      - name: Locate AUR package files
        id: aur-files
        shell: bash
        run: |
          set -euo pipefail

          pkgbuild="$(find aur-package -type f -path "*/${AUR_PKGNAME}/PKGBUILD" | head -n 1 || true)"
          srcinfo="$(find aur-package -type f -path "*/${AUR_PKGNAME}/.SRCINFO" | head -n 1 || true)"

          if [[ -z "$pkgbuild" || -z "$srcinfo" ]]; then
            archive="$(find aur-package -type f -name "${AUR_PKGNAME}-${{ github.ref_name }}-aur.tar.gz" | head -n 1 || true)"
            if [[ -z "$archive" ]]; then
              echo "AUR package files for $AUR_PKGNAME were not found in the build-AUR artifact." >&2
              exit 1
            fi

            mkdir -p aur-package/extracted
            tar -xzf "$archive" -C aur-package/extracted
            pkgbuild="$(find aur-package/extracted -type f -name PKGBUILD | head -n 1 || true)"
            srcinfo="$(find aur-package/extracted -type f -name .SRCINFO | head -n 1 || true)"
          fi

          if [[ -z "$pkgbuild" || -z "$srcinfo" ]]; then
            echo "PKGBUILD or .SRCINFO is missing from the AUR package artifact." >&2
            exit 1
          fi

          package_dir="$(dirname "$pkgbuild")"
          if [[ "$(dirname "$srcinfo")" != "$package_dir" ]]; then
            echo "PKGBUILD and .SRCINFO are in different directories." >&2
            exit 1
          fi

          echo "package_dir=$package_dir" >> "$GITHUB_OUTPUT"

      - name: Build Arch package
        shell: bash
        run: |
          set -euo pipefail

          useradd -m builder
          install -d -m 755 -o builder -g builder /tmp/arch-package
          cp "${{ steps.aur-files.outputs.package_dir }}/PKGBUILD" \
            "${{ steps.aur-files.outputs.package_dir }}/.SRCINFO" \
            /tmp/arch-package/
          chown builder:builder /tmp/arch-package/PKGBUILD /tmp/arch-package/.SRCINFO

          runuser -u builder -- bash -lc "cd /tmp/arch-package && makepkg --noconfirm --cleanbuild"

          mkdir -p arch-package-output
          cp /tmp/arch-package/*.pkg.tar.zst arch-package-output/

      - name: Upload Arch package artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-Arch-Package
          path: arch-package-output/*.pkg.tar.zst
          retention-days: 7

      - name: Publish Arch package to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" arch-package-output/*.pkg.tar.zst --repo EvolvingLMMs-Lab/lmms-lab-writer --clobber

  publish-aur:
    name: Publish AUR Package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    needs:
      - build-aur-package
      - release-arch-package
    runs-on: ubuntu-latest
    env:
      AUR_HOME: /tmp/aur-home
      AUR_WORKDIR: /tmp/aur-packages
    strategy:
      fail-fast: false
      matrix:
        aur_pkgname:
          - lmms-lab-writer-bin
          - lmms-lab-writer
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git openssh-client

      - name: Download AUR package files
        uses: actions/download-artifact@v4
        with:
          name: build-AUR
          path: aur-package

      - name: Locate AUR package files
        id: aur-files
        shell: bash
        run: |
          set -euo pipefail
          AUR_PKGNAME="${{ matrix.aur_pkgname }}"

          pkgbuild="$(find aur-package -type f -path "*/${AUR_PKGNAME}/PKGBUILD" | head -n 1 || true)"
          srcinfo="$(find aur-package -type f -path "*/${AUR_PKGNAME}/.SRCINFO" | head -n 1 || true)"

          if [[ -z "$pkgbuild" || -z "$srcinfo" ]]; then
            archive="$(find aur-package -type f -name "${AUR_PKGNAME}-${{ github.ref_name }}-aur.tar.gz" | head -n 1 || true)"
            if [[ -z "$archive" ]]; then
              echo "AUR package files for $AUR_PKGNAME were not found in the build-AUR artifact." >&2
              exit 1
            fi

            rm -rf aur-package/extracted
            mkdir -p "aur-package/extracted/${AUR_PKGNAME}"
            tar -xzf "$archive" -C "aur-package/extracted/${AUR_PKGNAME}"
            pkgbuild="$(find "aur-package/extracted/${AUR_PKGNAME}" -type f -name PKGBUILD | head -n 1 || true)"
            srcinfo="$(find "aur-package/extracted/${AUR_PKGNAME}" -type f -name .SRCINFO | head -n 1 || true)"
          fi

          if [[ -z "$pkgbuild" || -z "$srcinfo" ]]; then
            echo "PKGBUILD or .SRCINFO is missing from the AUR package artifact." >&2
            exit 1
          fi

          package_dir="$(dirname "$pkgbuild")"
          if [[ "$(dirname "$srcinfo")" != "$package_dir" ]]; then
            echo "PKGBUILD and .SRCINFO are in different directories." >&2
            exit 1
          fi

          echo "package_dir=$package_dir" >> "$GITHUB_OUTPUT"

      - name: Configure AUR SSH
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "Missing GitHub secret: AUR_SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          install -d -m 700 "$AUR_HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' > "$AUR_HOME/.ssh/aur"
          chmod 600 "$AUR_HOME/.ssh/aur"
          ssh-keygen -y -f "$AUR_HOME/.ssh/aur" > /dev/null

          ssh-keyscan -t ed25519 aur.archlinux.org > "$AUR_HOME/.ssh/known_hosts"
          chmod 600 "$AUR_HOME/.ssh/known_hosts"
          {
            printf '%s\n' "Host aur.archlinux.org"
            printf '%s\n' "  HostName aur.archlinux.org"
            printf '%s\n' "  User aur"
            printf '%s\n' "  IdentityFile $AUR_HOME/.ssh/aur"
            printf '%s\n' "  IdentitiesOnly yes"
            printf '%s\n' "  UserKnownHostsFile $AUR_HOME/.ssh/known_hosts"
            printf '%s\n' "  StrictHostKeyChecking yes"
          } > "$AUR_HOME/.ssh/config"
          chmod 600 "$AUR_HOME/.ssh/config"

          ssh -F "$AUR_HOME/.ssh/config" -T aur.archlinux.org help

      - name: Push package to AUR
        shell: bash
        run: |
          set -euo pipefail
          AUR_PKGNAME="${{ matrix.aur_pkgname }}"

          export GIT_SSH_COMMAND="ssh -F $AUR_HOME/.ssh/config"
          aur_url="ssh://aur@aur.archlinux.org/${AUR_PKGNAME}.git"
          workdir="$AUR_WORKDIR/$AUR_PKGNAME"
          package_dir="${{ steps.aur-files.outputs.package_dir }}"

          rm -rf "$workdir"
          if ! git clone "$aur_url" "$workdir"; then
            echo "AUR repository $AUR_PKGNAME does not exist yet; preparing first publish."
            mkdir -p "$workdir"
            git init --initial-branch=master "$workdir"
            git -C "$workdir" remote add origin "$aur_url"
          fi

          cp "$package_dir/PKGBUILD" "$package_dir/.SRCINFO" "$workdir/"
          git -C "$workdir" config user.name "github-actions[bot]"
          git -C "$workdir" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$workdir" add PKGBUILD .SRCINFO

          if git -C "$workdir" diff --cached --quiet; then
            echo "AUR package $AUR_PKGNAME is already up to date."
            exit 0
          fi

          git -C "$workdir" commit -m "Release ${{ github.ref_name }}"
          git -C "$workdir" push origin HEAD:master
